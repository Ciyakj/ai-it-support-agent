{% extends "base.html" %}

{% block title %}Create User - IT Admin Panel{% endblock %}

{% block content %}
<h2>Create New User</h2>

<div class="card">
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="user@company.com">
        
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" required placeholder="John">
        
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" required placeholder="Doe">
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="success">Create User</button>
            <a href="/users" class="btn secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
